<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HHHA - Portal de Pacientes</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 2rem; color: #333; }
        
        .container { max-width: 550px; margin: 0 auto; background: #fff; padding: 2rem; border-radius: 8px; border: 1px solid #ddd; }
        
        header { text-align: center; margin-bottom: 1.5rem; }
        h2 { margin: 0; font-size: 1.5rem; }
        
        input { 
            width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; 
            border-radius: 4px; box-sizing: border-box; font-size: 16px;
        }
        
        button#btnBuscar { 
            width: 100%; padding: 12px; background-color: #3498db; color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold;
        }

        #resultados { margin-top: 20px; }
        
        .paciente-info { background: #eef7ff; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #d0e7ff; }

        .examen-card { 
            background: #fff; border: 1px solid #eee; border-left: 4px solid #3498db; 
            padding: 12px 15px; margin-top: 8px; border-radius: 4px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-view { 
            background-color: #27ae60; color: white; padding: 8px 15px; 
            border-radius: 4px; border: none; cursor: pointer; font-weight: bold; font-size: 13px;
        }

        /* Modal simple */
        .modal { display: none; position: fixed; z-index: 10; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: #fff; margin: 2% auto; width: 90%; max-width: 850px; border-radius: 8px; position: relative; overflow: hidden; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 24px; cursor: pointer; color: #666; z-index: 20; }
        #modal-body { min-height: 400px; display: flex; justify-content: center; background: #333; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>Portal de Pacientes HHHA</h2>
            <p style="margin:5px 0; color:#666;">Consulta de resultados</p>
        </header>
        
        <input type="text" id="rutInput" placeholder="RUT (ej: 12345678-9)" onkeypress="if(event.key === 'Enter') buscarExamenes()">
        <button id="btnBuscar" onclick="buscarExamenes()">Consultar</button>

        <div id="resultados"></div>
    </div>

    <div id="previewModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="cerrarModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        function limpiarRut(rut) { return rut.replace(/[.\s-]/g, '').toLowerCase(); }

        async function buscarExamenes() {
            const val = document.getElementById('rutInput').value;
            if(!val) return;
            const resDiv = document.getElementById('resultados');
            resDiv.innerHTML = '<p style="text-align:center">Buscando...</p>';

            try {
                const response = await fetch(`http://98.85.187.238:8000/paciente/${limpiarRut(val)}`);
                if (!response.ok) throw new Error('No encontrado');
                const data = await response.json();
                
                let html = `
                    <div class="paciente-info">
                        <strong>${data.paciente.nombre}</strong><br>
                        <span style="font-size:13px">${data.paciente.email}</span>
                    </div>
                `;

                data.examenes.forEach(ex => {
                    html += `
                        <div class="examen-card">
                            <div>
                                <div style="font-weight:bold; font-size:14px">${ex.tipo_examen.toUpperCase()}</div>
                                <div style="font-size:11px; color:#999">${ex.nombre_archivo}</div>
                            </div>
                            <button class="btn-view" onclick="abrirVista('${ex.url_descarga}', '${ex.tipo_examen}')">Ver Detalle</button>
                        </div>`;
                });
                resDiv.innerHTML = html;
            } catch (e) {
                resDiv.innerHTML = '<p style="color:red; text-align:center">Error: RUT no encontrado</p>';
            }
        }

        function abrirVista(url, tipo) {
            const body = document.getElementById('modal-body');
            document.getElementById('previewModal').style.display = "block";
            body.innerHTML = tipo.toLowerCase() === 'imagenologia' 
                ? `<img src="${url}" style="max-width:100%; max-height:80vh; margin:auto">`
                : `<iframe src="${url}" width="100%" height="600px" style="border:none; background:#fff"></iframe>`;
        }

        function cerrarModal() { document.getElementById('previewModal').style.display = "none"; }
        window.onclick = (e) => { if(e.target.className === 'modal') cerrarModal(); }
    </script>
</body>
</html>
