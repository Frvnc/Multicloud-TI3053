version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hhha_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hhha_network

  backend:
    build: ./backend
    container_name: hhha_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AZURE_CONNECTION_STRING: ${AZURE_CONNECTION_STRING}
      AZURE_CONTAINER_LAB: ${AZURE_CONTAINER_LAB}
      AZURE_CONTAINER_IMG: ${AZURE_CONTAINER_IMG}
      AZURE_STORAGE_URL: ${AZURE_STORAGE_URL}
      AWS_STORAGE_URL: ${AWS_STORAGE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - hhha_network

  frontend:
    build: ./frontend
    container_name: hhha_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - hhha_network

networks:
  hhha_network:
    driver: bridge

volumes:
  pgdata: